name: DevOps Pulse (animated README)

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  schedule:
    - cron: "0 2 * * 1"  # Monday 02:00 UTC

permissions:
  contents: write

jobs:
  pulse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate animated SVG
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          root = Path(".")
          files = [str(p).lower() for p in root.rglob("*") if p.is_file()]

          def has(rx: str) -> bool:
            r = re.compile(rx)
            return any(r.search(f) for f in files)

          # Presence-based signals (no stats)
          signals = [
            ("Code", True),
            ("API", has(r"fastapi") or has(r"(^|/)main\.py$") or has(r"(^|/)app/")),
            ("Tests", has(r"(^|/)tests/") or has(r"pytest")),
            ("Container", has(r"(^|/)dockerfile$") or has(r"docker")),
            ("Cloud/K8s", has(r"(^|/)(k8s|kubernetes)/") or has(r"helm") or has(r"kind:\s*deployment")),
            ("Security", has(r"trivy|bandit|safety|dependabot|codeql")),
            ("Ship", has(r"(^|/)\.github/workflows/") or has(r"(^|/)ci") or has(r"cd")),
          ]

          n = len(signals)

          # Canvas
          w, h = 980, 180
          x0, y = 70, 95
          gap = 130

          # Pixel node sizes
          node_w, node_h = 44, 28
          px = 4  # "pixel" size for inner blocks

          def stage_fill(ok: bool):
            return "#35d07f" if ok else "#263041"   # active vs dim

          def stage_stroke(ok: bool):
            return "#2be38d" if ok else "#3a4252"

          def label_fill(ok: bool):
            return "#e6eef8" if ok else "#93a1b5"

          # Build sequential keyframes: each node gets a short bright window
          step = 100 / n
          def keyframes_for(i: int) -> str:
            start = i * step
            mid = start + step * 0.45
            end = start + step * 0.95
            # subtle brighten + tiny glow, then back
            return f"""
            @keyframes pulse{i} {{
              0% {{ opacity: 0.55; filter: none; }}
              {start:.3f}% {{ opacity: 0.55; filter: none; }}
              {mid:.3f}% {{ opacity: 1.0; filter: drop-shadow(0 0 6px rgba(53,208,127,0.35)); }}
              {end:.3f}% {{ opacity: 0.55; filter: none; }}
              100% {{ opacity: 0.55; filter: none; }}
            }}
            """

          css_keyframes = "\n".join(keyframes_for(i) for i in range(n))
          css_nodes = "\n".join([f".node{i} {{ animation: pulse{i} 7.0s linear infinite; }}" for i in range(n)])

          # SVG parts
          lines = []
          nodes = []
          labels = []

          # Connecting line style (pixel-ish)
          for i in range(n - 1):
            x = x0 + i * gap
            x2 = x0 + (i + 1) * gap
            lines.append(
              f'<rect x="{x + node_w//2 + 8}" y="{y - 4}" width="{(x2 - x) - node_w - 16}" height="8" rx="2" '
              f'fill="#2a3446" opacity="0.9" />'
            )

          for i, (name, ok) in enumerate(signals):
            x = x0 + i * gap

            # Outer "pixel tile"
            fill = stage_fill(ok)
            stroke = stage_stroke(ok)

            # Inner pixels (gives pixel-art feel)
            inner = []
            ix0 = x - (node_w // 2) + 6
            iy0 = y - (node_h // 2) + 6
            cols = (node_w - 12) // px
            rows = (node_h - 12) // px

            # simple checker pattern
            for r_i in range(rows):
              for c_i in range(cols):
                if (r_i + c_i) % 2 == 0:
                  inner.append(
                    f'<rect x="{ix0 + c_i*px}" y="{iy0 + r_i*px}" width="{px}" height="{px}" '
                    f'fill="#0b1220" opacity="0.12" />'
                  )

            nodes.append(
              f'''
              <g class="node node{i}">
                <rect x="{x - node_w//2}" y="{y - node_h//2}" width="{node_w}" height="{node_h}" rx="6"
                      fill="{fill}" stroke="{stroke}" stroke-width="2" opacity="0.85"/>
                {''.join(inner)}
              </g>
              '''
            )

            labels.append(
              f'<text x="{x}" y="{y + 48}" text-anchor="middle" font-size="14" fill="{label_fill(ok)}">{name}</text>'
            )

          svg = f"""<svg xmlns="http://www.w3.org/2000/svg" width="{w}" height="{h}" viewBox="0 0 {w} {h}" shape-rendering="crispEdges">
            <defs>
              <style>
                .title {{
                  font: 800 18px system-ui, -apple-system, Segoe UI, Roboto, Arial;
                  fill: #e6eef8;
                }}
                .sub {{
                  font: 500 13px system-ui, -apple-system, Segoe UI, Roboto, Arial;
                  fill: #97a6ba;
                }}
                .node {{ opacity: 0.55; }}
                {css_keyframes}
                {css_nodes}
              </style>
            </defs>

            <rect x="22" y="22" width="{w-44}" height="{h-44}" rx="18" fill="#0b1220" stroke="#1d2840" stroke-width="2"/>
            <text x="48" y="52" class="title">Workflow ? Maybe : </text>
            

            <g>
              {''.join(lines)}
              {''.join(nodes)}
              {''.join(labels)}
            </g>
          </svg>
          """

          out_dir = root / "assets"
          out_dir.mkdir(exist_ok=True)
          out_path = out_dir / "devops-pulse-v2.svg"
          out_path.write_text(svg, encoding="utf-8")
          print("Wrote", out_path)
          PY

      - name: Commit changes (if any)
        run: |
          git add assets || true
          if git diff --cached --quiet; then
            echo "Nothing staged."
            exit 0
          fi
          git config user.name "devops-pulse[bot]"
          git config user.email "devops-pulse[bot]@users.noreply.github.com"
          git commit -m "chore: update devops pulse"
          git push origin HEAD:main
