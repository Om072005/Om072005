name: Update GitHub Streak Stats
 
on:
  schedule:
    - cron: "0 0 * * *"   # Runs every day at midnight UTC
  push:
    branches: [main]       # Also runs on every push
  workflow_dispatch:        # Allows manual trigger from Actions tab
 
permissions:
  contents: write           # Needed to commit the generated SVG back
 
jobs:
  update-streak:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
 
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
 
      - name: Install dependencies
        run: npm install node-fetch
        working-directory: scripts
 
      - name: Generate streak SVG
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GH_USERNAME: Om072005         # <-- Change to your GitHub username
        run: node scripts/generate-streak.js
 
      - name: Commit and push if changed
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"
          git add streak.svg
          git diff --staged --quiet || git commit -m "chore: update streak stats [skip ci]"
          git push
