name: Engineering Readiness Radar

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * 1"  # every Monday 03:30 UTC

permissions:
  contents: write

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate readiness report
        shell: bash
        run: |
          python - <<'PY'
          import os, re, datetime, pathlib

          ROOT = pathlib.Path(".")
          files = [str(p).lower() for p in ROOT.rglob("*") if p.is_file()]
          def exists(pattern):
            # pattern may be exact file name or regex
            rx = re.compile(pattern)
            return any(rx.search(f) for f in files)

          checks = [
            ("Python project file (pyproject/requirements)", exists(r"(^|/)pyproject\.toml$") or exists(r"(^|/)requirements\.txt$")),
            ("FastAPI entrypoint (app/main.py etc.)", exists(r"(^|/)main\.py$") or exists(r"fastapi")),
            ("Tests folder", exists(r"(^|/)tests/")),
            ("Dockerfile", exists(r"(^|/)dockerfile$")),
            ("Docker Compose", exists(r"(^|/)docker-compose\.ya?ml$")),
            ("Kubernetes manifests", exists(r"(^|/)(k8s|kubernetes)/") or exists(r"\.ya?ml$") and any(("kind:" in open(p, "r", errors="ignore").read(3000).lower()) for p in ROOT.rglob("*.yml"))),
            ("CI workflows present", exists(r"^\.github/workflows/.*\.ya?ml$")),
            ("Lint/format tool (ruff/black/flake8/pre-commit)", exists(r"ruff|black|flake8|pre-commit")),
            ("Security scan (trivy/bandit/safety/dependabot)", exists(r"trivy|bandit|safety|dependabot")),
            ("Docs (README/ docs/)", exists(r"(^|/)readme\.md$") or exists(r"(^|/)docs/")),
            ("License", exists(r"(^|/)license$")),
            ("Env example (.env.example)", exists(r"\.env\.example$")),
            ("Model card / ML notes (model_card|MODEL.md)", exists(r"model_card|model\.md|modelcard")),
          ]

          # If this is a profile README repo, it may not have code; we still grade honestly.
          total = len(checks)
          score = sum(1 for _, ok in checks if ok)
          pct = int(round((score/total)*100))

          # Weighted "signal" message
          if pct >= 85:
            level = "Production-leaning"
            emoji = "🟢"
          elif pct >= 65:
            level = "Project-ready"
            emoji = "🟡"
          else:
            level = "Early-stage"
            emoji = "🔴"

          now = datetime.datetime.utcnow().strftime("%Y-%m-%d %H:%M UTC")

          strengths = [name for name, ok in checks if ok]
          gaps = [name for name, ok in checks if not ok]

          # Suggest next actions (top 4)
          priority_map = [
            "CI workflows present",
            "Tests folder",
            "Lint/format tool (ruff/black/flake8/pre-commit)",
            "Dockerfile",
            "Security scan (trivy/bandit/safety/dependabot)",
            "Python project file (pyproject/requirements)",
            "Env example (.env.example)",
            "Docs (README/ docs/)",
            "Kubernetes manifests",
            "FastAPI entrypoint (app/main.py etc.)",
            "License",
            "Model card / ML notes (model_card|MODEL.md)",
            "Docker Compose",
          ]
          gaps_set = set(gaps)
          next_actions = [x for x in priority_map if x in gaps_set][:4]

          def bullet(items):
            return "\n".join([f"- {i}" for i in items]) if items else "- (none)"

          report = f"""
          ## Engineering Readiness Radar
          **Score:** {emoji} **{pct}/100** — *{level}*  
          **Last check:** {now}

          **Strong signals**
          {bullet(strengths[:8])}
          {"\n- …" if len(strengths) > 8 else ""}

          **Biggest gaps**
          {bullet(gaps[:8])}
          {"\n- …" if len(gaps) > 8 else ""}

          **Next actions (high impact, low effort)**
          {bullet(next_actions)}
          """.strip() + "\n"

          # Update README between markers
          readme_path = ROOT / "README.md"
          if not readme_path.exists():
            raise SystemExit("README.md not found")

          readme = readme_path.read_text(encoding="utf-8", errors="ignore")
          start = "<!-- READINESS:START -->"
          end = "<!-- READINESS:END -->"

          if start not in readme or end not in readme:
            raise SystemExit("Markers not found in README.md. Add <!-- READINESS:START --> and <!-- READINESS:END -->")

          new_readme = re.sub(
            re.escape(start) + r".*?" + re.escape(end),
            start + "\n\n" + report + "\n" + end,
            readme,
            flags=re.S
          )
          readme_path.write_text(new_readme, encoding="utf-8")
          print(report)
          PY

      - name: Commit changes (if any)
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "readiness-radar[bot]"
          git config user.email "readiness-radar[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: update engineering readiness radar"
          git push
