      .sub {
        font: 500 13px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        fill: #97a6ba;
      }
      .cursor {
        animation: blink 1.1s steps(1,end) infinite;
      }
      @keyframes blink {
        0%, 45% { opacity: 1; }
        46%, 100% { opacity: 0; }
      }
      
