<svg width="760" height="180" viewBox="0 0 760 180" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="GitHub Streak Stats for Om072005">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', monospace; }
    </style>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fe428e"/>
      <stop offset="100%" style="stop-color:#f8d847"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
 
  <!-- Background -->
  <rect width="760" height="180" rx="12" fill="url(#bg)" stroke="#30363d" stroke-width="1"/>
 
  <!-- Dividers -->
  <line x1="253" y1="20" x2="253" y2="160" stroke="#30363d" stroke-width="1"/>
  <line x1="507" y1="20" x2="507" y2="160" stroke="#30363d" stroke-width="1"/>
 
  <!-- ── LEFT: Total Contributions ── -->
  <text x="126" y="72" text-anchor="middle" font-size="42" font-weight="700" fill="#fe428e" filter="url(#glow)">158</text>
  <text x="126" y="100" text-anchor="middle" font-size="13" fill="#f8d847">Total Contributions</text>
  <text x="126" y="120" text-anchor="middle" font-size="11" fill="#8b949e">Aug 2024 – Jul 24, 2026</text>
 
  <!-- ── CENTER: Current Streak (ring) ── -->
  <!-- Track ring -->
  <circle cx="380" cy="88" r="40" fill="none" stroke="#21262d" stroke-width="7"/>
  <!-- Progress ring -->
  <circle cx="380" cy="88" r="40" fill="none"
    stroke="url(#ringGrad)" stroke-width="7"
    stroke-linecap="round"
    stroke-dasharray="251.33"
    stroke-dashoffset="251.33"
    transform="rotate(-90 380 88)"
    filter="url(#glow)"
  />
  <!-- Flame icon -->
  <text x="380" y="75" text-anchor="middle" font-size="14">🔥</text>
  <!-- Count -->
  <text x="380" y="96" text-anchor="middle" font-size="22" font-weight="700" fill="#fe428e">0</text>
  <text x="380" y="144" text-anchor="middle" font-size="13" fill="#f8d847">Current Streak</text>
  <text x="380" y="162" text-anchor="middle" font-size="10" fill="#8b949e">No active streak</text>
 
  <!-- ── RIGHT: Longest Streak ── -->
  <text x="634" y="72" text-anchor="middle" font-size="42" font-weight="700" fill="#fe428e" filter="url(#glow)">7</text>
  <text x="634" y="100" text-anchor="middle" font-size="13" fill="#f8d847">Longest Streak</text>
  <text x="634" y="120" text-anchor="middle" font-size="11" fill="#8b949e">May 19, 2026 – May 25, 2026</text>
 
  <!-- Updated timestamp -->
  <text x="756" y="175" text-anchor="end" font-size="9" fill="#484f58">Updated Jul 24, 2026</text>
</svg>